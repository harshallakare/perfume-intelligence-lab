# ─────────────────────────────────────────────────────────────────────────────
# Perfume Intelligence Lab — Docker Compose (MySQL edition)
#
# Services:
#   db    — MySQL 8.0 database
#   app   — Next.js application
#   nginx — Reverse proxy (port 80)
#
# Usage:
#   cp .env.docker.example .env.docker
#   docker compose --env-file .env.docker up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL 8.0 ───────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: pil-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-pil}
      MYSQL_USER:          ${MYSQL_USER:-pil}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d  # optional init scripts
    ports:
      - "${MYSQL_EXTERNAL_PORT:-3306}:3306"   # expose only if you need external DB access
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password

  # ── Next.js App ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pil-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:     production
      DATABASE_URL: mysql://${MYSQL_USER:-pil}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-pil}
      PORT:         3000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: pil-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/certs                   # mount SSL certs here
      - nginx_logs:/var/log/nginx

volumes:
  mysql_data:
    driver: local
  nginx_certs:
    driver: local
  nginx_logs:
    driver: local
